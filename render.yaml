# Render Blueprint for TYPACK (Laravel backend)
# Deploy: Connect this repo in Render Dashboard → New → Blueprint
# Then set APP_URL in the web service to your actual URL (e.g. https://typack-xxxx.onrender.com)

databases:
  - name: typack-db
    databaseName: typack
    plan: free
    region: oregon

services:
  - type: web
    name: typack
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: TYPACK
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: ASSET_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: typack-db
          property: connectionString
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
